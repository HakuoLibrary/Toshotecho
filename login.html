<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>白鴎図書館 管理画面ログイン</title>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

*{
box-sizing:border-box;
font-family:"Yu Gothic","Meiryo",sans-serif;
}


body{

margin:0;
height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:#eef5ff;

}



.login-box{

width:420px;
max-width:90%;

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 0 15px rgba(0,0,0,.2);

}



h1{

text-align:center;

color:#005bac;

margin-bottom:25px;

}



.notice{

background:#fff6cc;

border:1px solid #d5b500;

padding:15px;

border-radius:10px;

line-height:1.7;

margin-bottom:25px;

}



label{

font-weight:bold;

display:block;

margin-top:15px;

}



input{

width:100%;

padding:12px;

font-size:16px;

margin-top:5px;

border-radius:8px;

border:1px solid #aaa;

}



button{

width:100%;

margin-top:25px;

padding:14px;

font-size:18px;

border:0;

border-radius:10px;

background:#005bac;

color:white;

cursor:pointer;

}



button:hover{

background:#003f80;

}



#error{

color:red;

font-weight:bold;

text-align:center;

margin-top:15px;

}



</style>

</head>


<body>


<div class="login-box">


<h1>
管理画面
</h1>



<div class="notice">

このページは管理画面です。<br>
キャンセルボタンを押して戻ってください。

</div>



<label>

メールアドレス

</label>


<input

type="email"

id="email"

placeholder="example@example.com"

>



<label>

パスワード

</label>


<input

type="password"

id="password"

placeholder="パスワード"

>



<button id="login">

ログイン

</button>



<div id="error"></div>


</div>





<script>


// ==========================
// Supabase設定
// ==========================


const SUPABASE_URL =
"https://lskrxpbqeukadpzygopa.supabase.co";


const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3J4cGJxZXVrYWRwenlnb3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NzE5NjcsImV4cCI6MjA5OTA0Nzk2N30.5uO__QfYKROJCNCDwgH0iN-xHh4ZMyNZqCTjBeMLFWI";



const supabaseClient =
supabase.createClient(

SUPABASE_URL,

SUPABASE_KEY

);





// ==========================
// ログイン処理
// ==========================


async function login(){


const email =
document
.getElementById("email")
.value.trim();



const password =
document
.getElementById("password")
.value;



const error =
document
.getElementById("error");



error.textContent="";



const {

data,

error:authError

}

=
await supabaseClient.auth.signInWithPassword({

email:email,

password:password

});




if(authError){


error.textContent =
"メールアドレスまたはパスワードが違います。";


console.log(authError);

return;

}




// ログイン成功

location.href="upload.html";


}






document
.getElementById("login")
.onclick=login;





// Enterキー

document.addEventListener(

"keydown",

function(e){


if(e.key==="Enter"){

login();

}


}

);







// 既にログイン済みなら移動

async function checkSession(){


const {

data:{session}

}

=
await supabaseClient.auth.getSession();



if(session){

location.href="upload.html";

}


}



checkSession();



</script>


</body>

</html>
