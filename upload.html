<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>
HTMLアップロード管理
</title>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

body{

font-family:"Yu Gothic",sans-serif;
background:#eef5ff;
margin:0;

}


header{

background:#005bac;
color:white;
padding:20px;
text-align:center;
font-size:26px;

}


main{

max-width:900px;
margin:30px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px #aaa;

}


button{

padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;

}


.upload{

background:#005bac;
color:white;

}


.logout{

background:#555;
color:white;
float:right;

}


.delete{

background:#cc0000;
color:white;

}


.view{

background:#009944;
color:white;

}


table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}


th{

background:#005bac;
color:white;

}


td,th{

padding:10px;
border:1px solid #ccc;

}


#message{

font-weight:bold;
margin:15px;

}


</style>


</head>


<body>


<header>

HTMLアップロード管理

<button class="logout" id="logout">

ログアウト

</button>

</header>


<main>


<h2>
HTMLファイル登録
</h2>


<input type="file" id="file" accept=".html,.htm">


<br>


<button class="upload" id="upload">

アップロード

</button>


<div id="message"></div>



<h2>
登録ファイル一覧
</h2>


<table>


<thead>

<tr>

<th>
ファイル名
</th>

<th>
操作
</th>

</tr>

</thead>


<tbody id="list">

</tbody>


</table>


</main>





<script>


const SUPABASE_URL =
"https://lskrxpbqeukadpzygopa.supabase.co";


const SUPABASE_KEY =
"sb_publishable_PkZN-OyjXqphhHD-zm_ncw_emBx84M4";


const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



const BUCKET =
"html-files";




const message =
document.getElementById("message");





// ログイン確認

async function checkLogin(){


const {

data:{session}

}
=
await supabaseClient.auth.getSession();


if(!session){

location.href="login.html";

}

}


checkLogin();







// アップロード

document
.getElementById("upload")
.onclick =
async()=>{


const file =
document.getElementById("file").files[0];


if(!file){

alert("ファイルを選択してください");

return;

}



message.innerHTML=
"アップロード中...";



const {

error

}
=
await supabaseClient.storage
.from(BUCKET)
.upload(

file.name,

file,

{

upsert:true

}

);



if(error){

message.style.color="red";

message.innerHTML=
error.message;

return;

}



message.style.color="green";

message.innerHTML=
"アップロードが完了しました";


loadFiles();


};








// ファイル一覧

async function loadFiles(){


const {

data,

error

}
=
await supabaseClient.storage
.from(BUCKET)
.list();



if(error){

alert(error.message);

return;

}



const area =
document.getElementById("list");


area.innerHTML="";



data.forEach(file=>{


let tr =
document.createElement("tr");



tr.innerHTML=

`

<td>
${file.name}
</td>

<td>


<button class="view"
onclick="openFile('${file.name}')">

表示

</button>


<button class="delete"
onclick="deleteFile('${file.name}')">

削除

</button>


</td>

`;



area.appendChild(tr);



});


}


loadFiles();







// Signed URL作成

window.openFile =
async(name)=>{


const {

data,

error

}

=
await supabaseClient.storage
.from(BUCKET)
.createSignedUrl(

name,

3600

);



if(error){

alert(error.message);

return;

}



window.open(
data.signedUrl,
"_blank"
);


};








// 削除

window.deleteFile =
async(name)=>{


if(!confirm(
name+"を削除しますか？"
)){

return;

}



const {

error

}

=
await supabaseClient.storage
.from(BUCKET)
.remove(

[name]

);



if(error){

alert(error.message);

return;

}



alert(
"削除しました"
);


loadFiles();


};








// ログアウト

document
.getElementById("logout")
.onclick =
async()=>{


await supabaseClient.auth.signOut();


location.href="login.html";


};



</script>


</body>

</html>
