<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>

管理画面｜図書手帳公式ホームページ

</title>

<link rel="icon"
type="image/png"
href="favicon.png">

<style>

/* ======================================
   RESET
====================================== */

*{

margin:0;
padding:0;
box-sizing:border-box;

}

html{

scroll-behavior:smooth;

}

body{

font-family:
"Yu Gothic UI",
"Yu Gothic",
Meiryo,
sans-serif;

background:#FAEEDD;

color:#444;

overflow-x:hidden;

}

/* ======================================
   HEADER
====================================== */

.header{

position:fixed;

top:0;
left:0;

width:100%;
height:80px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 24px;

background:rgba(255,255,255,.72);

backdrop-filter:blur(12px);

box-shadow:
0 5px 20px rgba(0,0,0,.08);

z-index:1000;

}

/* ---------- LOGO ---------- */

.logo img{

height:52px;

width:auto;

display:block;

transition:.25s;

}

.logo img:hover{

transform:scale(1.05);

}

/* ---------- MENU BUTTON ---------- */

.menu-btn{

width:56px;

height:56px;

border:none;

border-radius:50%;

background:white;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:6px;

cursor:pointer;

box-shadow:
0 6px 20px rgba(0,0,0,.15);

transition:.3s;

}

.menu-btn:hover{

transform:scale(1.05);

}

.menu-btn span{

width:26px;

height:3px;

background:#444;

border-radius:20px;

transition:.35s;

}

/* ☰ → × */

.menu-btn.active span:nth-child(1){

transform:
translateY(9px)
rotate(45deg);

}

.menu-btn.active span:nth-child(2){

opacity:0;

}

.menu-btn.active span:nth-child(3){

transform:
translateY(-9px)
rotate(-45deg);

}

/* ======================================
   MENU
====================================== */

.menu{

position:fixed;

top:0;
right:-320px;

width:300px;

height:100vh;

background:white;

padding-top:90px;

display:flex;

flex-direction:column;

box-shadow:
-10px 0 30px rgba(0,0,0,.12);

transition:.35s;

z-index:999;

}

.menu.open{

right:0;

}

.menu a{

padding:18px 24px;

text-decoration:none;

font-weight:bold;

color:#444;

transition:.25s;

}

.menu a:hover{

background:#FAEEDD;

padding-left:36px;

color:#B67832;

}

/* ---------- Overlay ---------- */

.overlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.25);

opacity:0;

pointer-events:none;

transition:.3s;

z-index:998;

}

.overlay.show{

opacity:1;

pointer-events:auto;

}

/* ======================================
   TITLE
====================================== */

.page-title{

margin-top:120px;

text-align:center;

font-size:38px;

color:#8B5A2B;

animation:fadeIn .8s;

}

@keyframes fadeIn{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/* ======================================
   LOGIN BOX
====================================== */

.login-box{

max-width:520px;

margin:40px auto;

padding:35px;

background:white;

border-radius:22px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);

text-align:center;

}

.login-box h2{

margin-bottom:20px;

color:#B67832;

}

.login-box input{

width:100%;

padding:15px;

font-size:16px;

border:2px solid #DDD;

border-radius:12px;

margin-bottom:20px;

outline:none;

transition:.25s;

}

.login-box input:focus{

border-color:#B67832;

}

.login-box button{

padding:15px 35px;

border:none;

border-radius:999px;

background:#B67832;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

.login-box button:hover{

transform:translateY(-3px);

box-shadow:
0 10px 20px rgba(182,120,50,.25);

}

/* ======================================
   MANAGER
====================================== */

.manager{

display:none;

max-width:1000px;

margin:40px auto 80px;

padding:0 25px;

animation:fadeIn .5s;

}

.card{

background:white;

border-radius:22px;

padding:30px;

margin-bottom:30px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);

}

.card h2{

color:#B67832;

margin-bottom:20px;

}

.file-select{

display:flex;

flex-wrap:wrap;

gap:15px;

align-items:center;

margin-top:20px;

}

.file-select input[type=file]{

flex:1;

padding:10px;

}

.btn{

background:#B67832;

color:white;

border:none;

border-radius:999px;

padding:14px 28px;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

.btn:hover{

transform:translateY(-3px);

box-shadow:
0 10px 20px rgba(182,120,50,.25);

}

.refresh{

margin-bottom:25px;

text-align:right;

}

#status{

margin-top:15px;

font-weight:bold;

color:#666;

}

#fileList{

display:flex;

flex-direction:column;

gap:15px;

margin-top:20px;

}

.file-item{

display:flex;

justify-content:space-between;

align-items:center;

padding:18px 20px;

border-radius:15px;

background:#FFF7EA;

transition:.25s;

}

.file-item:hover{

transform:translateY(-2px);

}

.file-name{

font-weight:bold;

word-break:break-all;

}

.download-btn{

background:#4CAF50;

color:white;

padding:10px 20px;

border-radius:999px;

text-decoration:none;

font-weight:bold;

transition:.25s;

}

.download-btn:hover{

background:#3f9843;

}

footer{

padding:35px;

text-align:center;

color:#777;

font-size:14px;

}

@media(max-width:768px){

.header{

height:72px;

padding:0 16px;

}

.logo img{

height:45px;

}

.page-title{

font-size:28px;

margin-top:105px;

}

.login-box{

margin:25px 15px;

padding:25px;

}

.manager{

padding:0 15px;

}

.file-item{

flex-direction:column;

gap:15px;

align-items:flex-start;

}

.download-btn{

width:100%;

text-align:center;

}

}

</style>

</head>

<body>

<header class="header">

<a href="index.html" class="logo">

<img src="icon.png" alt="図書手帳">

</a>

<button
class="menu-btn"
id="menuBtn">

<span></span>
<span></span>
<span></span>

</button>

</header>

<div
class="overlay"
id="overlay"></div>

<nav
class="menu"
id="menu">

<a href="index.html">ホーム</a>

<a href="features.html">特徴</a>

<a href="application.html">申し込み</a>

<a href="character.html">キャラクター紹介</a>

<a href="movie.html">紹介動画</a>

<a href="mutter.html">かもめんのつぶやき</a>

<a href="tool.html">お役立ちツール</a>

<a href="https://lib-finder.net/hakuo/" target="_blank">
蔵書検索（Ａ・Ｂ棟共通）
</a>

</nav>

<h1 class="page-title">

管理画面

</h1>

<div
class="login-box"
id="loginBox">

<h2>

パスワードを入力してください

</h2>

<input
type="password"
id="password"
placeholder="Password">

<button
id="loginBtn">

ログイン

</button>

</div>

<div
class="manager"
id="manager">

<div class="refresh">

<button
class="btn"
id="refreshBtn">

🔄 更新

</button>

</div>

<div class="card">

<h2>

HTMLファイルをアップロード

</h2>

<div class="file-select">

<input
type="file"
id="fileInput"
accept=".html,.htm">

<button
class="btn"
id="uploadBtn">

保存

</button>

</div>

<div id="status"></div>

</div>

<div class="card">

<h2>

保存済みHTML一覧

</h2>

<div id="fileList">

<!-- JavaScriptで一覧表示 -->

</div>

</div>

</div>

<footer>

© ２０２６ 図書手帳公式ホームページ

</footer>


<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* ==========================================
   Supabase
========================================== */

const SUPABASE_URL =
"https://lskrxpbqeukadpzygopa.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxza3J4cGJxZXVrYWRwenlnb3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NzE5NjcsImV4cCI6MjA5OTA0Nzk2N30.5uO__QfYKROJCNCDwgH0iN-xHh4ZMyNZqCTjBeMLFWI";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const BUCKET =
"html-files";

/* ==========================================
   Login
========================================== */

const PASSWORD =
"kamome890";

const loginBtn =
document.getElementById("loginBtn");

const password =
document.getElementById("password");

const loginBox =
document.getElementById("loginBox");

const manager =
document.getElementById("manager");

loginBtn.onclick = ()=>{

if(password.value===PASSWORD){

loginBox.style.display="none";

manager.style.display="block";

loadFiles();

}else{

alert("パスワードが違います。");

}

};

/* Enterキー */

password.addEventListener(
"keydown",
e=>{

if(e.key==="Enter"){

loginBtn.click();

}

});

/* ==========================================
   Upload
========================================== */

const uploadBtn =
document.getElementById("uploadBtn");

uploadBtn.onclick =
async()=>{

const file =
document.getElementById("fileInput")
.files[0];

if(!file){

alert("HTMLを選択してください。");

return;

}

if(
!(
file.name.endsWith(".html")||
file.name.endsWith(".htm")
)
){

alert("HTMLファイルのみアップロードできます。");

return;

}

document.getElementById("status")
.innerHTML="アップロード中...";

const {error}=await supabase
.storage
.from(BUCKET)
.upload(
file.name,
file,
{
upsert:true
}
);

if(error){

document.getElementById("status")
.innerHTML="保存失敗";

alert(error.message);

return;

}

document.getElementById("status")
.innerHTML="保存しました。";

loadFiles();

};

/* ==========================================
   File List
========================================== */

async function loadFiles(){

const fileList =
document.getElementById("fileList");

fileList.innerHTML="読込中...";

const {data,error}=await supabase
.storage
.from(BUCKET)
.list();

if(error){

fileList.innerHTML="取得失敗";

return;

}

fileList.innerHTML="";

    data.forEach(file=>{

        const row=document.createElement("div");
        row.className="file-item";

        const name=document.createElement("div");
        name.className="file-name";
        name.textContent=file.name;

        const download=document.createElement("a");
        download.className="download-btn";
        download.textContent="ダウンロード";

        const {data:urlData}=supabase
        .storage
        .from(BUCKET)
        .getPublicUrl(file.name);

        download.href=urlData.publicUrl;
        download.target="_blank";

        row.appendChild(name);
        row.appendChild(download);

        fileList.appendChild(row);

    });

}

/* ==========================================
   更新ボタン
========================================== */

document
.getElementById("refreshBtn")
.onclick=()=>{

loadFiles();

};

/* ==========================================
   MENU
========================================== */

const menuBtn=
document.getElementById("menuBtn");

const menu=
document.getElementById("menu");

const overlay=
document.getElementById("overlay");

function openMenu(){

menu.classList.add("open");
overlay.classList.add("show");
menuBtn.classList.add("active");

}

function closeMenu(){

menu.classList.remove("open");
overlay.classList.remove("show");
menuBtn.classList.remove("active");

}

menuBtn.onclick=()=>{

if(menu.classList.contains("open")){

closeMenu();

}else{

openMenu();

}

};

overlay.onclick=closeMenu;

/* ==========================================
   ページ読込時
========================================== */

window.onload=()=>{

password.focus();

};

</script>

</body>
</html>
