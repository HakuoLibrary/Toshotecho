<style>

/* =========================
   BASE
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Yu Gothic","Meiryo",sans-serif;
background:#FAEEDD;
color:#444;
overflow-x:hidden;
}

html{
scroll-behavior:smooth;
}

/* =========================
   HEADER
========================= */

.header{
position:fixed;
top:0;
left:0;
width:100%;
height:80px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(12px);
box-shadow:0 5px 20px rgba(0,0,0,0.08);
z-index:1000;
}

.logo img{
height:45px;
width:auto;
object-fit:contain;
cursor:pointer;
transition:0.3s;
}

.logo img:hover{
transform:scale(1.05);
}

/* =========================
   MENU BUTTON
========================= */

.menu-btn{
width:55px;
height:55px;
border-radius:50%;
border:none;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:6px;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

.menu-btn span{
width:26px;
height:3px;
background:#444;
border-radius:5px;
transition:0.3s;
}

.menu-btn.active span:nth-child(1){
transform:translateY(9px) rotate(45deg);
}

.menu-btn.active span:nth-child(2){
opacity:0;
}

.menu-btn.active span:nth-child(3){
transform:translateY(-9px) rotate(-45deg);
}

/* =========================
   MENU
========================= */

.menu{
position:fixed;
top:0;
right:-320px;
width:300px;
height:100vh;
background:white;
padding-top:100px;
display:flex;
flex-direction:column;
transition:0.4s ease;
box-shadow:-10px 0 30px rgba(0,0,0,0.15);
z-index:999;
}

.menu.open{
right:0;
}

.menu a{
padding:18px 25px;
text-decoration:none;
color:#444;
font-weight:bold;
}

.menu a:hover{
padding-left:35px;
color:#b67832;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:998;
}

.overlay.show{
opacity:1;
pointer-events:auto;
}

/* =========================
   TITLE
========================= */

.title{
text-align:center;
font-size:36px;
margin:120px 0 30px;
color:#8b5a2b;
}

/* =========================
   FEED
========================= */

.feed{
max-width:900px;
margin:0 auto;
padding:0 20px 60px;
}

.post{
background:white;
border-radius:18px;
padding:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
animation:fadeIn 0.4s ease;
position:relative;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* 日付 */
.date{
font-size:12px;
color:#888;
margin-bottom:8px;
}

/* 吹き出し */
.bubble{
background:#fff7ea;
padding:15px;
border-radius:15px;
position:relative;
margin-top:10px;
line-height:1.8;
}

.bubble::before{
content:"";
position:absolute;
top:-10px;
left:20px;
border-width:0 10px 10px 10px;
border-style:solid;
border-color:transparent transparent #fff7ea transparent;
}

/* 画像 */
.post img{
display:block;
width:300px;
max-width:100%;
height:auto;
margin:15px auto 0;
border-radius:12px;
}

/* いいね */
.like-btn{
margin-top:10px;
display:inline-flex;
align-items:center;
gap:6px;
cursor:pointer;
color:#b67832;
font-weight:bold;
user-select:none;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:#e8d5bb;
margin-top:60px;
}

</style>

</head>

<body>

<div class="feed">

</div>

<script>

/* =========================
   MENU
========================= */

const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");

btn.addEventListener("click", () => {
menu.classList.toggle("open");
overlay.classList.toggle("show");
btn.classList.toggle("active");
});

overlay.addEventListener("click", () => {
menu.classList.remove("open");
overlay.classList.remove("show");
btn.classList.remove("active");
});


/* =========================
   いいね
========================= */

function like(el){

const span = el.querySelector("span");

let num = parseInt(span.textContent);

if(isNaN(num)){
num = 0;
}

span.textContent = num + 1;

}

</script>
