<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>海外研修VIDEO 2026</title>

<!-- タブアイコン -->
<link rel="icon" type="image/png" href="icon2.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Yu Gothic","Hiragino Sans","Meiryo",sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
    background:
        radial-gradient(circle at top left,#dff7ff 0%,transparent 40%),
        radial-gradient(circle at bottom right,#b8ebff 0%,transparent 35%),
        linear-gradient(180deg,#eefcff,#dff6ff,#ffffff);
}

/* ホームボタン */
.home-btn{
    position:fixed;
    top:20px;
    left:20px;
    padding:10px 18px;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.7);
    border-radius:999px;
    text-decoration:none;
    color:#2d6d8a;
    font-size:.9rem;
    font-weight:500;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
    transition:.25s;
    z-index:1000;
}

.home-btn:hover{
    background:#2d6d8a;
    color:#fff;
    transform:translateY(-2px);
}

.wrapper{
    width:100%;
    max-width:900px;
}

.card{
    background:rgba(255,255,255,0.72);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.6);
    border-radius:24px;
    padding:32px;
    box-shadow:0 15px 40px rgba(0,120,180,.12);
}

/* タイトル */
h1{
    text-align:center;
    color:#2d6d8a;
    font-size:clamp(1.3rem,2vw,1.8rem);
    font-weight:500;
    letter-spacing:.18em;
    margin-bottom:6px;
}

.subtitle{
    text-align:center;
    color:#7a9eaf;
    font-size:.9rem;
    margin-bottom:24px;
    letter-spacing:.08em;
}

/* 動画 */
.video-area{
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.18);
    background:#000;
}

video{
    display:block;
    width:100%;
    height:auto;
}

/* フッター */
.footer{
    margin-top:18px;
    text-align:center;
    color:#7f98a6;
    font-size:.82rem;
}

/* スマホ */
@media(max-width:600px){

    body{
        padding:15px;
    }

    .home-btn{
        top:12px;
        left:12px;
        padding:8px 14px;
        font-size:.8rem;
    }

    .card{
        padding:18px;
        border-radius:18px;
    }

    h1{
        font-size:1.15rem;
        letter-spacing:.12em;
    }

    .subtitle{
        font-size:.8rem;
        margin-bottom:16px;
    }

    .footer{
        font-size:.75rem;
    }

}
</style>

</head>

<body>

<!-- ホームへ戻る -->
<a href="index.html" class="home-btn">← ホームへ戻る</a>

<div class="wrapper">

<div class="card">

<h1>海外研修VIDEO 2026</h1>

<div class="subtitle">
Study Tour in Utah 2026
</div>

<div class="video-area">
<video controls autoplay muted playsinline preload="auto">
    <source src="kaigaikenshu.mp4" type="video/mp4">
    お使いのブラウザは動画再生に対応していません。
</video>
</div>

<div class="footer">
© 2026 海外研修旅行実行委員会
</div>

</div>

</div>

</body>
</html>
