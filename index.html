<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>図書手帳公式ホームページ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f6efe7,#e8d8c3);
    font-family:
        "Hiragino Sans",
        "Yu Gothic",
        "YuGothic",
        "Noto Sans JP",
        sans-serif;
    color:#5b4636;
}

.container{
    text-align:center;
    padding:40px 30px;
}

.message{
    font-size:clamp(1.4rem,3vw,2.3rem);
    font-weight:600;
    line-height:1.8;
    letter-spacing:0.08em;
    text-shadow:0 1px 2px rgba(255,255,255,0.5);
}

@media (max-width:600px){
    .container{
        padding:30px 20px;
    }

    .message{
        line-height:1.7;
    }
}
</style>

</head>

<body>

<div class="container">
    <div class="message">
        図書手帳公式ホームページは現在準備中です。
        公開は７月中旬を予定しております。
    </div>
</div>

</body>
</html>
